<!doctype html>
<!--
  VWRT dashboard — React app rendered from prototype JSX (app/*.jsx).
  Phase 1: prototype shell + mock data (data.js).
  Later phases will replace data.js with a real-data bridge fetching
  from /cgi-bin/* and move login into the React tree.

  data-variant / data-theme persist user choice via TweaksPanel +
  localStorage. Defaults match :root in css/design.css.
-->
<html lang="vi" data-variant="apple" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>VWRT · Router Admin Panel</title>
        <link rel="stylesheet" href="css/fonts.css" />
        <link rel="stylesheet" href="css/design.css" />
    </head>
    <body>
        <div id="root"></div>

        <!-- React 18 UMD + ReactDOM 18 UMD + Babel-standalone (JSX in-browser).
             Pinned versions to avoid CDN-driven breakage. crossorigin so React
             surfaces real error messages. Phase 5 may pre-compile JSX so we
             can drop Babel and shave ~2.6 MB. -->
        <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
        <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
        <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

        <!-- data.js seeds window.I18N (translations) + a mock window.VData.
             real-data.js then replaces VData with a live one fed from the
             router's /cgi-bin/* endpoints. Loading order matters — VData
             must be defined before any JSX that references it. -->
        <script src="app/data.js?v=1"></script>
        <script src="app/real-data.js?v=1"></script>

        <!-- Bootloader: fetch each JSX file in order, Babel.transform → eval.
             We hand-roll the loop instead of relying on babel-standalone's
             automatic `<script type=text/babel src=...>` handling, which
             skips files inconsistently when 5+ are queued at the same time. -->
        <script>
        (async () => {
            const files = [
                'app/icons.jsx?v=1',
                'app/charts.jsx?v=1',
                'app/tweaks-panel.jsx?v=1',
                'app/screens.jsx?v=1',
                'app/app.jsx?v=1',
            ];
            const showErr = (msg) => {
                const root = document.getElementById('root');
                root.innerHTML = '<pre style="color:#ff5a5f; padding:24px; font-family:ui-monospace,monospace; font-size:13px; white-space:pre-wrap;">' +
                    'VWRT failed to boot:\n' + msg + '</pre>';
            };
            try {
                for (const f of files) {
                    const src = await fetch(f).then(r => {
                        if (!r.ok) throw new Error(f + ' → HTTP ' + r.status);
                        return r.text();
                    });
                    const compiled = Babel.transform(src, {
                        presets: ['react'],
                        filename: f,
                    }).code;
                    // Use indirect eval so JSX modules execute at global scope
                    // (so window-scoped declarations like `function App() {}` stick).
                    (0, eval)(compiled);
                }
            } catch (e) {
                console.error('[VWRT bootloader]', e);
                showErr((e && e.message) || String(e));
            }
        })();
        </script>
    </body>
</html>
