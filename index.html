<!DOCTYPE html>
<html lang="vi" data-variant="noc" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VWRT · Router Admin Panel</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/design.css">
    <link rel="stylesheet" href="css/toast.css">
    <style>
        /* Login-specific overrides aligned with VWRT prototype */
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        .login-wrap {
            width: 100%;
            max-width: 380px;
            padding: 24px;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 28px;
        }
        .brand-mark {
            background: var(--accent);
            color: var(--bg);
            font-weight: 700;
            font-family: var(--font-display);
            display: grid;
            place-items: center;
        }
        .h1 {
            font-size: 22px;
            font-weight: 700;
            font-family: var(--font-display);
            margin: 0;
        }
        .dim {
            color: var(--text-dim);
            font-size: 13px;
        }
        .tiny {
            font-size: 11px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap svg {
            position: absolute;
            left: 12px;
            top: 12px;
            color: var(--text-faint);
            pointer-events: none;
        }
        .input {
            background: var(--bg-2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius-sm);
            height: 42px;
            padding: 0 14px 0 38px;
            width: 100%;
            box-sizing: border-box;
            font-family: var(--font-sans);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }
        .input:focus {
            border-color: var(--accent);
        }
        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: var(--radius-sm);
            height: 44px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            transition: opacity 0.15s, transform 0.05s;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:active { transform: translateY(1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: wait; }
        #error-msg.error-text {
            color: var(--danger);
            font-size: 13px;
            margin: 8px 0 0;
            font-weight: 600;
        }
        #error-msg.hidden { display: none; }
        .footer-info {
            margin-top: 22px;
            font-family: var(--font-mono);
            color: var(--text-faint);
            font-size: 11px;
            text-align: center;
        }
        .footer-info a {
            color: var(--text-dim);
            text-decoration: none;
        }
        .footer-info a:hover {
            color: var(--accent);
        }
        /* Shake animation for failed login */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card fade-in">
            <div style="display:flex; justify-content:center; margin-bottom:18px;">
                <div class="brand-mark" style="width:56px; height:56px; font-size:22px; border-radius:14px;">V</div>
            </div>
            <div class="h1" style="margin-bottom:6px; text-align:center;">VWRT</div>
            <div class="dim" style="margin-bottom:26px; text-align:center;">Router Admin Panel</div>

            <form id="loginForm" style="display:flex; flex-direction:column; gap:12px;">
                <div class="input-wrap">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <input class="input" id="username" placeholder="Tài khoản" value="root" required autocomplete="username" />
                </div>
                <div class="input-wrap">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input class="input" id="password" type="password" placeholder="Mật khẩu (Để trống nếu không có)" autocomplete="current-password" />
                </div>
                <button class="btn-primary" type="submit" id="btnLogin" style="margin-top:6px;">
                    <span>Đăng nhập</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
                <p id="error-msg" class="error-text hidden">Thông tin đăng nhập không đúng!</p>
            </form>

            <div class="footer-info">
                <p style="margin:0;">VWRT fork by <a href="https://github.com/tuanlongsav/vwrt-dashboard" target="_blank">longht</a> <span id="app-version"></span></p>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
    <script src="js/toast.js"></script>
</body>
</html>
